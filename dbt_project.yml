name: 'support_analytics'
version: '1.0.0'

profile: 'support_analytics'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

tests:
  +severity: warn

models:
  support_analytics:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    core:
      +materialized: table
      +schema: core
    mart:
      +materialized: table
      +schema: mart
