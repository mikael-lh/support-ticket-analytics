version: 2

models:
  - name: int_tickets_filtered
    description: >
      Freshdesk tickets with internal/test tickets removed.
      Filters out @titanbay.com and @titanbay.co.uk domains (~100 tickets).
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null

  - name: int_tickets_enriched
    description: >
      Tickets enriched with requester identity resolution. Each ticket is
      linked to an investor or RM via email matching, with the resolved
      partner_id and entity_id carried forward.
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null
      - name: requester_type
        description: >
          Derived field. investor, relationship_manager, or unknown —
          determined by email matching against platform tables.
        tests:
          - not_null
          - accepted_values:
              values: ['investor', 'relationship_manager', 'unknown']
      - name: resolved_partner_id
        description: >
          Derived field. Partner resolved via investor->entity->partner
          or RM->partner. NULL for unknown requesters.

  - name: int_tickets_with_close_proximity
    description: >
      Tickets enriched with the nearest fund close for the ticket's resolved
      partner. days_to_nearest_close is positive if the ticket was raised
      before the close, negative if after. NULL when no partner is resolved.
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null
      - name: days_to_nearest_close
        description: Derived field. Days between ticket creation and nearest fund close.
      - name: nearest_close_id
        description: Derived field. The close_id of the nearest fund close.
      - name: nearest_close_status
        description: Derived field. Status of the nearest fund close.
